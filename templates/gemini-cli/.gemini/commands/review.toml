# Invoked via: /review [path]
# Reviews staged changes or a specific file for security, correctness, and maintainability.

description = "Review staged changes or a specific file for bugs, security issues, and code quality."

prompt = """
Review the code changes or file provided. If the user specified a path, read that file.
Otherwise run: shell("git diff --cached") to see staged changes, or shell("git diff HEAD~1") for the last commit.

Check for:
- Security issues: injection vectors, exposed secrets, unvalidated input
- Correctness: logic errors, unhandled edge cases, off-by-one errors, race conditions
- Performance: N+1 queries, blocking I/O in hot paths
- Maintainability: unclear naming, functions over ~40 lines, missing error handling at boundaries

Output one finding per bullet: [critical|warning|note] file:line — what the problem is and why it matters.
Skip style issues the linter already catches. Be concise and actionable.
End with a one-sentence summary: "X critical issues, Y warnings."

User input: $ARGUMENTS
"""
