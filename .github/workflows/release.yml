name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the version-bump commit that this workflow pushes back to main
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Determine bump type from the latest commit message.
      # feat:                        → minor
      # BREAKING CHANGE in message   → major
      # fix: / refactor: / perf: / anything else → patch
      # chore: / docs: / test: / ci: / style: / build: → skip
      - name: Determine version bump
        id: bump
        run: |
          MSG=$(git log -1 --format=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qiE 'BREAKING[[:space:]]CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^feat(\(.+\))?[!]?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^(chore|docs|test|ci|style|build)(\(.+\))?:'; then
            echo "type=skip" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # Compute the next version string and check whether its tag already exists.
      # This makes the step idempotent: a duplicate run won't re-tag and re-publish.
      - name: Compute next version
        id: next
        if: steps.bump.outputs.type != 'skip'
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          TYPE="${{ steps.bump.outputs.type }}"

          if [ "$TYPE" = "major" ]; then
            NEXT="$((MAJOR + 1)).0.0"
          elif [ "$TYPE" = "minor" ]; then
            NEXT="$MAJOR.$((MINOR + 1)).0"
          else
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "version=v$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: v$NEXT"

          if git ls-remote --tags origin "refs/tags/v$NEXT" | grep -q .; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$NEXT already exists — skipping release"
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and tag
        if: steps.bump.outputs.type != 'skip' && steps.next.outputs.already_released != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npm version ${{ steps.bump.outputs.type }} \
            --message "chore: release %s [skip release]"
          git push --follow-tags

      - name: Publish to npm
        if: steps.bump.outputs.type != 'skip' && steps.next.outputs.already_released != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
